<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Hover Effect CSS Gallery</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #eaedec; }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .gallery-item {
            position: relative;
            background: #000;
            overflow: hidden;
            height: 150px;
            border-radius: 4px;
        }
        .gallery-item img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: all 0.5s ease;
        }
        .caption {
            position: absolute; bottom: 10px; left: 0; right: 0;
            color: white; font-size: 14px; z-index: 2;
        }
        .zoom-in:hover img { transform: scale(1.2); }
        .fade:hover img { opacity: 0.5; }
        .blur:hover img { filter: blur(4px); }
        .overlay-text .text-layer {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,128,0,0.7); opacity: 0; transition: 0.5s;
            display: flex; align-items: center; justify-content: center; color: white;
        }
        .overlay-text:hover .text-layer { opacity: 1; }
    </style>
</head>
<body>
    <h2>HOVER-EFFECT CSS</h2>
    <div class="gallery-grid">
        <div class="gallery-item zoom-in">
            <img src="https://picsum.photos/200/150?random=1" alt="Img">
            <div class="caption">Hover Zoom In</div>
        </div>
        <div class="gallery-item fade">
            <img src="https://picsum.photos/200/150?random=2" alt="Img">
            <div class="caption">Hover Fade</div>
        </div>
        <div class="gallery-item blur">
            <img src="https://picsum.photos/200/150?random=3" alt="Img">
            <div class="caption">Hover Blur</div>
        </div>
        <div class="gallery-item overlay-text">
            <img src="https://picsum.photos/200/150?random=4" alt="Img">
            <div class="text-layer">Overlay Text</div>
        </div>
    </div>
</body>
</html>
